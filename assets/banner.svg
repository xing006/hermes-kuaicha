<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Glow effects -->
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g stroke="url(#grid)" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Data flow dots (left side) -->
  <circle cx="60" cy="90" r="4" fill="#3b82f6" opacity="0.6"/>
  <circle cx="80" cy="130" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="55" cy="170" r="5" fill="#3b82f6" opacity="0.7"/>
  <circle cx="90" cy="200" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="65" cy="240" r="4" fill="#6366f1" opacity="0.6"/>
  <circle cx="50" cy="290" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="85" cy="320" r="4" fill="#8b5cf6" opacity="0.4"/>

  <!-- Data flow dots (right side) -->
  <circle cx="1120" cy="80" r="4" fill="#f59e0b" opacity="0.5"/>
  <circle cx="1140" cy="140" r="3" fill="#f97316" opacity="0.4"/>
  <circle cx="1110" cy="200" r="5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="1135" cy="260" r="3" fill="#ef4444" opacity="0.4"/>
  <circle cx="1125" cy="310" r="4" fill="#f97316" opacity="0.5"/>

  <!-- Bridge connection lines (data flow visualization) -->
  <g stroke="#6366f1" stroke-width="1" fill="none" opacity="0.25">
    <path d="M95,90 Q200,60 350,100 Q500,140 600,200 Q700,260 850,300 Q1000,340 1110,310"/>
    <path d="M90,200 Q250,180 400,200 Q550,220 600,200 Q650,180 800,220 Q950,260 1110,200" stroke="#f97316"/>
    <path d="M85,320 Q200,340 350,320 Q500,300 600,200 Q700,100 850,120 Q1000,140 1120,80" stroke="#3b82f6" stroke-dasharray="4,4"/>
  </g>

  <!-- Main title -->
  <text x="200" y="200" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="42" font-weight="700" fill="url(#accent)" letter-spacing="2">
    Kuaicha MCP Bridge
  </text>
  <text x="200" y="240" font-family="'SF Pro','Segoe UI','Helvetica Neue',sans-serif" font-size="18" fill="#94a3b8" letter-spacing="1">
    Enterprise Data Engine for Hermes Agent
  </text>

  <!-- Subtitle line - Chinese -->
  <text x="200" y="268" font-family="'SF Pro','Segoe UI','Helvetica Neue',sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5">
    同花顺快查 · 3.7亿+市场主体 · 300+数据维度
  </text>

  <!-- MCP tag badge -->
  <rect x="200" y="290" width="82" height="26" rx="13" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
  <text x="241" y="308" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">
    MCP
  </text>

  <!-- Hermes badge -->
  <rect x="292" y="290" width="90" height="26" rx="13" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.7"/>
  <text x="337" y="308" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#818cf8" text-anchor="middle" font-weight="600">
    Hermes
  </text>

  <!-- Discover → Call flow indicator -->
  <g transform="translate(200, 335)">
    <rect x="0" y="0" width="85" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="42" y="15" font-family="'SF Mono','Consolas',monospace" font-size="11" fill="#93c5fd" text-anchor="middle">discover</text>
    <text x="100" y="13" font-family="sans-serif" font-size="14" fill="#475569">→</text>
    <rect x="120" y="0" width="55" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="147" y="15" font-family="'SF Mono','Consolas',monospace" font-size="11" fill="#fbbf24" text-anchor="middle">call</text>
  </g>

  <!-- Data visualization bars (right panel) -->
  <g transform="translate(790, 90)" opacity="0.6">
    <rect x="0" y="0" width="20" height="60" rx="3" fill="#3b82f6" opacity="0.8"/>
    <rect x="28" y="15" width="20" height="45" rx="3" fill="#6366f1" opacity="0.7"/>
    <rect x="56" y="25" width="20" height="35" rx="3" fill="#8b5cf6" opacity="0.6"/>
    <rect x="84" y="10" width="20" height="50" rx="3" fill="#f59e0b" opacity="0.7"/>
    <rect x="112" y="30" width="20" height="30" rx="3" fill="#f97316" opacity="0.6"/>
    <rect x="140" y="5" width="20" height="55" rx="3" fill="#ef4444" opacity="0.5"/>
    <rect x="168" y="20" width="20" height="40" rx="3" fill="#3b82f6" opacity="0.5"/>
    <rect x="196" y="8" width="20" height="52" rx="3" fill="#6366f1" opacity="0.6"/>
  </g>

  <!-- Data nodes network -->
  <g transform="translate(800, 240)" opacity="0.4">
    <circle cx="30" cy="0" r="6" fill="#3b82f6"/>
    <circle cx="85" cy="-30" r="4" fill="#6366f1"/>
    <circle cx="85" cy="30" r="4" fill="#8b5cf6"/>
    <circle cx="140" cy="-50" r="3" fill="#f59e0b"/>
    <circle cx="140" cy="50" r="3" fill="#f97316"/>
    <circle cx="140" cy="0" r="5" fill="#6366f1"/>
    <circle cx="195" cy="-30" r="3" fill="#ef4444"/>
    <circle cx="195" cy="30" r="3" fill="#3b82f6"/>
    <g stroke="#475569" stroke-width="0.5" fill="none">
      <line x1="30" y1="0" x2="85" y2="-30"/>
      <line x1="30" y1="0" x2="85" y2="30"/>
      <line x1="85" y1="-30" x2="140" y2="-50"/>
      <line x1="85" y1="30" x2="140" y2="50"/>
      <line x1="85" y1="-30" x2="140" y2="0"/>
      <line x1="85" y1="30" x2="140" y2="0"/>
      <line x1="140" y1="-50" x2="195" y2="-30"/>
      <line x1="140" y1="50" x2="195" y2="30"/>
      <line x1="140" y1="0" x2="195" y2="-30"/>
      <line x1="140" y1="0" x2="195" y2="30"/>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="395" width="1200" height="5" fill="url(#accent)"/>

</svg>
